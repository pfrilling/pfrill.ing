id: node_redirects
migration_group: phil_frilling
migration_tags:
  - nodes
label: 'Node redirects'

source:
  plugin: url_redirects
  key: legacydb
  constants:
    slash: '/'
    INTERNAL: 'internal:'
    REDIRECT_CODE: '301'
    ENTITY_TYPE: 'node'

destination:
  plugin: 'entity:redirect'

process:
  new_nid:
    - plugin: migration_lookup
      migration:
        - articles
      source:
        - entity_id
      no_stub: true
    - plugin: skip_on_empty
      method: row

  redirect_source/path: alias
  redirect_redirect/uri:
    plugin: concat
    source:
      - constants/INTERNAL
      - constants/slash
      - constants/ENTITY_TYPE
      - constants/slash
      - '@new_nid'
  langcode: langcode
  status_code: constants/REDIRECT_CODE

migration_dependencies:
  required:
    - articles

dependencies:
  module:
    - pf_migrate
