id: taxonomy_redirects
migration_group: phil_frilling
migration_tags:
  - taxonomy_terms
label: 'Taxonomy redirects'

source:
  plugin: url_redirects
  key: legacydb
  constants:
    slash: '/'
    INTERNAL: 'internal:'
    REDIRECT_CODE: '301'
    ENTITY_TYPE: 'taxonomy/term'

destination:
  plugin: 'entity:redirect'

process:
  new_nid:
    - plugin: migration_lookup
      migration:
        - tags
        - client_tags
      source:
        - entity_id
      no_stub: true
    - plugin: skip_on_empty
      method: row

  redirect_source/path: alias
  redirect_redirect/uri:
    plugin: concat
    source:
      - constants/INTERNAL
      - constants/slash
      - constants/ENTITY_TYPE
      - constants/slash
      - '@new_nid'
  langcode: langcode
  status_code: constants/REDIRECT_CODE

migration_dependencies:
  required:
    - tags
    - client_tags

dependencies:
  module:
    - pf_migrate
