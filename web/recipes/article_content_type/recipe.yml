name: 'Article'
description: 'A content type for blog posts with tags, client tags, images, resources, and comments.'
type: 'Content type recipe'
install:
  - comment
  - image
  - file
  - taxonomy
  - text
  - node
  - menu_ui
  - layout_builder
config:
  strict:
    # Treat field storages strictly, since they influence the database layout.
    - field.storage.node.body
    - field.storage.node.comment
    - field.storage.node.field_client_tags
    - field.storage.node.field_image
    - field.storage.node.field_resources
    - field.storage.node.field_tags
    - field.storage.node.layout_builder__layout
  import:
    node:
      - core.entity_view_mode.node.full
      - core.entity_view_mode.node.teaser
      - core.entity_view_mode.node.rss
      - system.action.node_delete_action
      - system.action.node_make_sticky_action
      - system.action.node_make_unsticky_action
      - system.action.node_promote_action
      - system.action.node_publish_action
      - system.action.node_save_action
      - system.action.node_unpromote_action
      - system.action.node_unpublish_action
    comment:
      - comment.type.comment
    taxonomy:
      - taxonomy.vocabulary.client_tags
      - taxonomy.vocabulary.tags
  actions:
    core.entity_form_display.node.article.default:
      createIfNotExists:
        targetEntityType: node
        bundle: article
        mode: default
        status: true
      setComponents:
        - name: title
          options:
            type: string_textfield
            weight: 0
            region: content
            settings:
              size: 60
              placeholder: ''
        - name: body
          options:
            type: text_textarea_with_summary
            weight: 1
            region: content
            settings:
              rows: 9
              summary_rows: 3
              placeholder: ''
              show_summary: false
        - name: field_tags
          options:
            type: entity_reference_autocomplete_tags
            weight: 2
            region: content
            settings:
              match_operator: CONTAINS
              match_limit: 10
              size: 60
              placeholder: ''
        - name: field_image
          options:
            type: image_image
            weight: 3
            region: content
            settings:
              progress_indicator: throbber
              preview_image_style: thumbnail
        - name: uid
          options:
            type: entity_reference_autocomplete
            weight: 4
            region: content
            settings:
              match_operator: CONTAINS
              match_limit: 10
              size: 60
              placeholder: ''
        - name: created
          options:
            type: datetime_timestamp
            weight: 5
            region: content
        - name: promote
          options:
            type: boolean_checkbox
            weight: 6
            region: content
            settings:
              display_label: true
        - name: sticky
          options:
            type: boolean_checkbox
            weight: 7
            region: content
            settings:
              display_label: true
        - name: comment
          options:
            type: comment_default
            weight: 8
            region: content
        - name: path
          options:
            type: path
            weight: 9
            region: content
        - name: status
          options:
            type: boolean_checkbox
            weight: 10
            region: content
            settings:
              display_label: true
        - name: field_resources
          options:
            type: file_generic
            weight: 26
            region: content
            settings:
              progress_indicator: throbber
    core.entity_view_display.node.article.default:
      createIfNotExists:
        targetEntityType: node
        bundle: article
        mode: default
        status: true
      setComponents:
        - name: field_image
          options:
            type: image
            label: hidden
            weight: -1
            region: content
            settings:
              image_link: ''
              image_style: large
              image_loading:
                attribute: lazy
        - name: body
          options:
            type: text_default
            label: hidden
            weight: 0
            region: content
        - name: field_tags
          options:
            type: entity_reference_label
            label: above
            weight: 10
            region: content
            settings:
              link: true
        - name: links
          options:
            weight: 100
            region: content
        - name: comment
          options:
            type: comment_default
            label: above
            weight: 110
            region: content
            settings:
              view_mode: default
              pager_id: 0
        - name: field_client_tags
          options:
            type: entity_reference_label
            label: above
            weight: 111
            region: content
            settings:
              link: true
        - name: field_resources
          options:
            type: file_default
            label: above
            weight: 112
            region: content
            settings:
              use_description_as_link_text: true
    core.entity_view_display.node.article.teaser:
      createIfNotExists:
        targetEntityType: node
        bundle: article
        mode: teaser
        status: true
      setComponents:
        - name: field_image
          options:
            type: image
            label: hidden
            weight: -1
            region: content
            settings:
              image_link: content
              image_style: large
              image_loading:
                attribute: lazy
        - name: body
          options:
            type: text_summary_or_trimmed
            label: hidden
            weight: 0
            region: content
            settings:
              trim_length: 600
        - name: field_tags
          options:
            type: entity_reference_label
            label: above
            weight: 10
            region: content
            settings:
              link: true
        - name: links
          options:
            weight: 100
            region: content