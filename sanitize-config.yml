# Sanitize sensitive user data
rewrite:
  users_field_data:
    name: 'concat("Test User ", uid)'
    pass: '"$2y$10$dummy.hash.for.testing"'
    mail: 'concat("user-", uid, "@test.example.com")'
    init: 'concat("user-", uid, "@test.example.com")'
  comment_field_data:
    name: 'REDACTED'
    mail: 'concat("user-", cid, "@test.example.com")'
    hostname: ''

# Include structure but no data for large/sensitive tables
nodata:
  - batch
  - cache_access_policy
  - cache_bootstrap
  - cache_config
  - cache_container
  - cache_data
  - cache_default
  - cache_discovery
  - cache_dynamic_page_cache
  - cache_entity
  - cache_menu
  - cache_page
  - cache_render
  - cache_toolbar
  - cachetags
  - flood
  - queue
  - semaphore
  - sequences
  - sessions
  - watchdog

