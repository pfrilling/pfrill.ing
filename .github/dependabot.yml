version: 2
updates:
  - package-ecosystem: "composer"
    directory: "/"
    reviewers:
      - "pfrilling"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "drupal/core*"
        update-types: ["version-update:semver-major"]
    groups:
      # Group Drupal Core together.
      drupal-core:
        patterns:
          - "drupal/core"
          - "drupal/core-composer-scaffold"
          - "drupal/core-project-message"
          - "drupal/core-recommended"
          - "drupal/core-dev"
