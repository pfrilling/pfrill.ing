name: e2e-tests.yml

on:
  pull_request:
    types: [ opened, synchronize, reopened ]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  packages: read

jobs:
  test:
    name: End to End testing.
    runs-on: ubuntu-latest
    env:
      UPSUN_PROJECT_ID: ${{ secrets.UPSUN_PROJECT_ID }}
      UPSUN_CLI_TOKEN: ${{ secrets.UPSUN_API_TOKEN }}
      UPSUN_CLI_NO_INTERACTION: 1
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    services:
      database:
        image: ghcr.io/pfrilling/pfrill.ing/database:latest
        credentials:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: db
          MYSQL_USER: db
          MYSQL_PASSWORD: db
        ports:
          - 3306:3306
    steps:
      - name: Set up environment variables
        if: ${{ inputs.envvars != '' }}
        run: |
          echo "${{ inputs.envvars }}" | while IFS= read -r line; do
            echo "${line}" >> $GITHUB_ENV
          done
          env

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: 'gd, curl, mbstring, mysqli, opcache, xml, zip, apcu'
          tools: 'composer'

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress

      - name: Configure Drupal database connection
        run: |
          # Configure Drupal to use the custom database service
          # Database is pre-populated with sanitized data from the custom image
          cat > web/sites/default/settings.local.php << 'EOF'
          <?php
          $databases['default']['default'] = [
            'database' => 'db',
            'username' => 'db',
            'password' => 'db',
            'prefix' => '',
            'host' => '127.0.0.1',
            'port' => '3306',
            'driver' => 'mysql',
            'collation' => 'utf8mb4_general_ci',
          ];
          EOF

      # @todo: Convert to script for reuse.
      - name: Run deployment script.
        run: |
          ./vendor/bin/drush updatedb --no-cache-clear --yes
          ./vendor/bin/drush cache:rebuild --yes
          ./vendor/bin/drush deploy:hook --yes
          ./vendor/bin/drush recipe ./recipes/essentials --yes
          ./vendor/bin/drush cache:rebuild --yes
          ./vendor/bin/drush serve &

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: tests/playwright/package-lock.json

      - name: Get package-lock hash for caching
        id: package-lock-hash
        working-directory: tests/playwright
        run: |
          PACKAGE_HASH=$(sha256sum package-lock.json | cut -d' ' -f1)
          echo "PACKAGE_HASH=$PACKAGE_HASH" >> $GITHUB_ENV
          echo "Package lock hash: $PACKAGE_HASH"

      - name: Cache playwright binaries
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: |
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PACKAGE_HASH }}

      - name: Install Playwright dependencies
        working-directory: tests/playwright
        run: |
          set -euxo pipefail
          npm ci

      - run: npx playwright install --with-deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - name: Run Playwright tests against feature env
        working-directory: tests/playwright
        env:
          BASE_URL: 'http://127.0.0.1:8888/'
          PLAYWRIGHT_BASE_URL: 'http://127.0.0.1:8888/'
        run: |
          set -euxo pipefail
          echo "Running Playwright tests against: $BASE_URL"
          echo "Playwright will use BASE_URL: $BASE_URL"
          npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            tests/playwright/playwright-report
            tests/playwright/test-results
          if-no-files-found: ignore

      - name: Upload visual regression artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diffs
          path: |
            tests/playwright/test-results/**/*-actual.png
            tests/playwright/test-results/**/*-diff.png
            tests/playwright/test-results/**/visual-regression.spec.ts-snapshots
          if-no-files-found: ignore

  # Auto-merge dependabot PRs when tests pass
  auto-merge:
    name: Auto-merge dependabot PR
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Auto-merge dependabot PR
        run: |
          echo "All tests passed! Auto-merging dependabot PR #${{ github.event.pull_request.number }}"
          gh pr merge ${{ github.event.pull_request.number }} --auto --squash --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
