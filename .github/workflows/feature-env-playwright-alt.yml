name: Upsun feature environment E2E (Alternative)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: upsun-e2e-alt-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  upsun-deploy-and-test:
    name: Provision feature env and run Playwright (Official Action)
    runs-on: ubuntu-latest
    env:
      UPSUN_PROJECT_ID: ${{ secrets.UPSUN_PROJECT_ID }}
      UPSUN_API_TOKEN: ${{ secrets.UPSUN_API_TOKEN }}
      UPSUN_CLI_TOKEN: ${{ secrets.UPSUN_API_TOKEN }}
      UPSUN_CLI_NO_INTERACTION: 1
      # Default parent environment to branch from (adjust if your default branch differs)
      UPSUN_PARENT_ENV: ${{ vars.UPSUN_PARENT_ENV || 'main' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine environment name
        id: names
        run: |
          # Use head_ref for PRs, ref_name for direct pushes to branches
          if [ -n "${{ github.head_ref }}" ]; then
            ENV_NAME="${{ github.head_ref }}"
          else
            ENV_NAME="${{ github.ref_name }}"
          fi
          echo "env_name=$ENV_NAME" >> "$GITHUB_OUTPUT"
          echo "Using environment name: $ENV_NAME"

      - name: Setup Upsun CLI
        uses: upsun/action-cli@v1
        with:
          cli_provider: 'upsun'
          cli_token: ${{ secrets.UPSUN_API_TOKEN }}
          project_id: ${{ secrets.UPSUN_PROJECT_ID }}

      - name: Create/activate Upsun environment and resolve URL
        id: upsun
        env:
          ENV_NAME: ${{ steps.names.outputs.env_name }}
        run: |
          set -euxo pipefail

          echo "Working with environment: $ENV_NAME"
          echo "Project ID: $UPSUN_PROJECT_ID"
          echo "Parent environment: $UPSUN_PARENT_ENV"
          
          NEEDS_WAIT=false

          # Check if environment already exists
          if upsun environment:info --environment "$ENV_NAME" --project "$UPSUN_PROJECT_ID" >/dev/null 2>&1; then
            echo "Environment $ENV_NAME already exists. Checking if it's active..."

            # Get environment info and check if it's active
            echo "Getting environment status..."
            ENV_INFO=$(upsun environment:info --environment "$ENV_NAME" --project "$UPSUN_PROJECT_ID" --format=plain)
            echo "$ENV_INFO"
            
            # Check if environment status is active (look for "status active" in the output)
            if echo "$ENV_INFO" | grep -q "status.*active"; then
              # Check if environment is dirty (deployment in progress) or has staged activities
              if echo "$ENV_INFO" | grep -q "is_dirty.*true"; then
                echo "Environment is active but dirty (deployment in progress). Waiting for completion..."
                NEEDS_WAIT=true
              elif echo "$ENV_INFO" | grep -q "has_staged_activities.*true"; then
                echo "Environment is active but has staged activities (deployment pending). Waiting for completion..."
                NEEDS_WAIT=true
              else
                echo "Environment is already active and clean."
              fi
            elif echo "$ENV_INFO" | grep -q "status.*paused"; then
              echo "Environment is paused. Resuming..."
              upsun environment:resume --project "$UPSUN_PROJECT_ID" --environment="$ENV_NAME" --no-wait
              NEEDS_WAIT=true
            elif echo "$ENV_INFO" | grep -q "status.*inactive"; then
              echo "Environment is inactive. Activating..."
              upsun environment:activate --project "$UPSUN_PROJECT_ID" --environment="$ENV_NAME" --no-wait
              NEEDS_WAIT=true
            else
              echo "Environment status unclear. Attempting to activate..."
              upsun environment:activate --project "$UPSUN_PROJECT_ID" --environment="$ENV_NAME" --no-wait
              NEEDS_WAIT=true
            fi
          else
            echo "Environment $ENV_NAME does not exist. Creating and activating..."
            # Create a new environment and activate it
            upsun environment:activate --project "$UPSUN_PROJECT_ID" --parent "$UPSUN_PARENT_ENV" --no-wait --environment="$ENV_NAME" --resources-init=minimum
            NEEDS_WAIT=true
          fi

          # Wait for environment to be ready (only if we just activated/resumed it)
          if [ "$NEEDS_WAIT" = "true" ]; then
            echo "Waiting for environment to be ready..."
            upsun environment:wait --project "$UPSUN_PROJECT_ID" --environment "$ENV_NAME"
          else
            echo "Environment was already active, skipping wait..."
          fi

          # Get the primary URL - try different approaches
          echo "Resolving environment URL..."
          PRIMARY_URL=""

          # Try to get URL from environment:url command
          if PRIMARY_URL=$(upsun environment:url --environment "$ENV_NAME" --project "$UPSUN_PROJECT_ID" --pipe 2>/dev/null | head -n1); then
            echo "Found URL via environment:url command: $PRIMARY_URL"
          fi

          # Fallback: try to get URLs from environment info and parse output
          if [ -z "$PRIMARY_URL" ]; then
            ENV_INFO=$(upsun environment:info --environment "$ENV_NAME" --project "$UPSUN_PROJECT_ID" --format=plain 2>/dev/null)
            # Look for URLs in the output and extract the first HTTPS URL
            if PRIMARY_URL=$(echo "$ENV_INFO" | grep -oE 'https://[^[:space:]]+' | head -n1); then
              echo "Found URL via environment info parsing: $PRIMARY_URL"
            fi
          fi

          if [ -z "$PRIMARY_URL" ]; then
            echo "Failed to resolve environment primary URL" >&2
            echo "Debug: Environment info:"
            upsun environment:info --environment "$ENV_NAME" --project "$UPSUN_PROJECT_ID" || true
            exit 1
          fi

          echo "base_url=$PRIMARY_URL" >> "$GITHUB_OUTPUT"
          echo "Resolved environment URL: $PRIMARY_URL"

      - name: Verify environment accessibility
        env:
          BASE_URL: ${{ steps.upsun.outputs.base_url }}
        run: |
          set -euxo pipefail
          echo "Verifying environment accessibility at $BASE_URL"

          # Wait for environment to respond with retries
          MAX_ATTEMPTS=30
          ATTEMPT=1

          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS: Testing $BASE_URL"

            if curl -sI --max-time 10 --connect-timeout 5 "$BASE_URL" | head -n1 | grep -q "HTTP/[12].[01] [23][0-9][0-9]"; then
              echo "✅ Environment is responding successfully"
              break
            fi

            if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
              echo "❌ Environment failed to respond after $MAX_ATTEMPTS attempts"
              exit 1
            fi

            echo "Environment not yet ready, waiting 10 seconds..."
            sleep 10
            ATTEMPT=$((ATTEMPT + 1))
          done

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: tests/playwright/package-lock.json

      - name: Install Playwright dependencies
        working-directory: tests/playwright
        run: |
          set -euxo pipefail
          npm ci
          npx playwright install --with-deps

      - name: Run Playwright tests against feature env
        working-directory: tests/playwright
        env:
          BASE_URL: ${{ steps.upsun.outputs.base_url }}
          PLAYWRIGHT_BASE_URL: ${{ steps.upsun.outputs.base_url }}
        run: |
          set -euxo pipefail
          echo "Running Playwright tests against: $BASE_URL"
          echo "Playwright will use BASE_URL: $BASE_URL"
          npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            tests/playwright/playwright-report
            tests/playwright/test-results
          if-no-files-found: ignore

  # Optional cleanup job that runs when PR is closed to remove the ephemeral env
  cleanup-env:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    # Remove the needs dependency to allow cleanup even if main job fails
    # needs: [upsun-deploy-and-test]
    env:
      UPSUN_PROJECT_ID: ${{ secrets.UPSUN_PROJECT_ID }}
      UPSUN_API_TOKEN: ${{ secrets.UPSUN_API_TOKEN }}
      UPSUN_CLI_TOKEN: ${{ secrets.UPSUN_API_TOKEN }}
      UPSUN_CLI_NO_INTERACTION: 1
    steps:
      - name: Setup Upsun CLI
        uses: upsun/action-cli@v1
        with:
          cli_provider: 'upsun'
          cli_token: ${{ secrets.UPSUN_API_TOKEN }}
          project_id: ${{ secrets.UPSUN_PROJECT_ID }}

      - name: Delete feature environment
        env:
          ENV_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          set -euxo pipefail
          echo "Attempting to clean up environment: $ENV_NAME"

          # Delete the environment if it exists
          if upsun environment:info --environment "$ENV_NAME" --project "$UPSUN_PROJECT_ID" >/dev/null 2>&1; then
            echo "Environment $ENV_NAME exists. Deleting..."
            upsun environment:delete --yes --environment "$ENV_NAME" --project "$UPSUN_PROJECT_ID"
            echo "✅ Environment $ENV_NAME has been deleted"
          else
            echo "Environment $ENV_NAME does not exist or was already deleted"
          fi
