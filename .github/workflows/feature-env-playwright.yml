name: Upsun feature environment E2E

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: upsun-e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  upsun-deploy-and-test:
    name: Provision feature env and run Playwright
    runs-on: ubuntu-latest
    env:
      UPSUN_PROJECT_ID: ${{ secrets.UPSUN_PROJECT_ID }}
      UPSUN_API_TOKEN: ${{ secrets.UPSUN_API_TOKEN }}
      PLATFORMSH_CLI_TOKEN: ${{ secrets.UPSUN_API_TOKEN }}
      PLATFORMSH_CLI_NO_INTERACTION: 1
      UPSUN_CLI_NO_INTERACTION: 1
      # Default parent environment to branch from (adjust if your default branch differs)
      UPSUN_PARENT_ENV: ${{ vars.UPSUN_PARENT_ENV || 'main' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine environment name
        id: names
        run: |
          ENV_NAME="${GITHUB_REF_NAME}"
          echo "env_name=$ENV_NAME" >> "$GITHUB_OUTPUT"

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: tests/playwright/package-lock.json

      - name: Install Upsun CLI
        run: |
          set -euxo pipefail
          # Install via official installer
          curl -fsSL https://raw.githubusercontent.com/platformsh/cli/main/installer.sh | bash

          # Ensure the installer-provided bin directory is on PATH for this job
          if [ -d "$HOME/.platformsh/bin" ]; then
            echo "$HOME/.platformsh/bin" >> "$GITHUB_PATH"
          fi
          if [ -d "$HOME/.local/bin" ]; then
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi

          # If 'upsun' is not present but 'platform' is, create a compatibility symlink
          if ! command -v upsun >/dev/null 2>&1; then
            if command -v platform >/dev/null 2>&1; then
              mkdir -p "$HOME/.local/bin"
              ln -sf "$(command -v platform)" "$HOME/.local/bin/upsun"
              echo "$HOME/.local/bin" >> "$GITHUB_PATH"
            fi
          fi

          # Verify installation
          if command -v upsun >/dev/null 2>&1; then
            upsun --version
          else
            echo "Upsun CLI not found after installer" >&2
            command -v platform >/dev/null 2>&1 && platform --version || true
            exit 1
          fi

      - name: Activate Upsun environment and resolve URL
        id: upsun
        env:
          ENV_NAME: ${{ steps.names.outputs.env_name }}
          UPSUN_CLI_TOKEN: ${{ secrets.UPSUN_API_TOKEN }}
        run: |
          set -euxo pipefail
          # Activate environment (will build & deploy latest)
          upsun environment:activate --yes --environment "$ENV_NAME" --project "$UPSUN_PROJECT_ID" --parent "$UPSUN_PARENT_ENV"

          # Wait for the environment to be reachable and get its primary URL
          # Extract primary URL from environment info (first URL listed)
          PRIMARY_URL=$(upsun environment:info --environment "$ENV_NAME" --project "$UPSUN_PROJECT_ID" --property=urls --format=plain | awk 'NR==1{print $1}')
          if [ -z "$PRIMARY_URL" ]; then
            echo "Failed to resolve environment primary URL" >&2
            exit 1
          fi

          echo "base_url=$PRIMARY_URL" >> "$GITHUB_OUTPUT"
          echo "Resolved environment URL: $PRIMARY_URL"

      - name: Install Playwright dependencies
        working-directory: tests/playwright
        run: |
          set -euxo pipefail
          npm ci
          npx playwright install --with-deps

      - name: Run Playwright tests against feature env
        working-directory: tests/playwright
        env:
          BASE_URL: ${{ steps.upsun.outputs.base_url }}
        run: |
          set -euxo pipefail
          echo "Testing against $BASE_URL"
          npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            tests/playwright/playwright-report
            tests/playwright/test-results
          if-no-files-found: ignore

  # Optional cleanup job that runs when PR is closed to remove the ephemeral env
  cleanup-env:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    needs: [upsun-deploy-and-test]
    env:
      UPSUN_PROJECT_ID: ${{ secrets.UPSUN_PROJECT_ID }}
      UPSUN_API_TOKEN: ${{ secrets.UPSUN_API_TOKEN }}
      PLATFORMSH_CLI_TOKEN: ${{ secrets.UPSUN_API_TOKEN }}
      PLATFORMSH_CLI_NO_INTERACTION: 1
      UPSUN_CLI_NO_INTERACTION: 1
    steps:
      - name: Install Upsun CLI
        run: |
          set -euxo pipefail
          # Install via official installer
          curl -fsSL https://raw.githubusercontent.com/platformsh/cli/main/installer.sh | bash

          # Ensure the installer-provided bin directory is on PATH for this job
          if [ -d "$HOME/.platformsh/bin" ]; then
            echo "$HOME/.platformsh/bin" >> "$GITHUB_PATH"
          fi
          if [ -d "$HOME/.local/bin" ]; then
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi

          # If 'upsun' is not present but 'platform' is, create a compatibility symlink
          if ! command -v upsun >/dev/null 2>&1; then
            if command -v platform >/dev/null 2>&1; then
              mkdir -p "$HOME/.local/bin"
              ln -sf "$(command -v platform)" "$HOME/.local/bin/upsun"
              echo "$HOME/.local/bin" >> "$GITHUB_PATH"
            fi
          fi

          # Verify installation
          if command -v upsun >/dev/null 2>&1; then
            upsun --version
          else
            echo "Upsun CLI not found after installer" >&2
            command -v platform >/dev/null 2>&1 && platform --version || true
            exit 1
          fi

      - name: Delete feature environment
        env:
          ENV_NAME: ${{ github.event.pull_request.head.ref }}
          UPSUN_CLI_TOKEN: ${{ secrets.UPSUN_API_TOKEN }}
        run: |
          set -euxo pipefail
          # Delete the environment if it exists
          if upsun environment:info --environment "$ENV_NAME" --project "$UPSUN_PROJECT_ID" >/dev/null 2>&1; then
            upsun environment:delete --yes --environment "$ENV_NAME" --project "$UPSUN_PROJECT_ID"
          fi
