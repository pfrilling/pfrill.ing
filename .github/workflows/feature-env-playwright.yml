name: Upsun feature environment E2E

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: upsun-e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  upsun-deploy-and-test:
    name: Provision feature env and run Playwright
    runs-on: ubuntu-latest
    env:
      UPSUN_PROJECT_ID: ${{ secrets.UPSUN_PROJECT_ID }}
      UPSUN_API_TOKEN: ${{ secrets.UPSUN_API_TOKEN }}
      # Default parent environment to branch from (adjust if your default branch differs)
      UPSUN_PARENT_ENV: ${{ vars.UPSUN_PARENT_ENV || 'main' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine environment name
        id: names
        run: |
          ENV_NAME="${GITHUB_REF_NAME}"
          echo "env_name=$ENV_NAME" >> "$GITHUB_OUTPUT"

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: tests/playwright/package-lock.json

      - name: Setup Upsun CLI
        uses: upsun/action-cli@v1
        with:
          cli_token: ${{ secrets.UPSUN_API_TOKEN }}
          project_id: ${{ secrets.UPSUN_PROJECT_ID }}

      - name: Create or update feature environment
        id: env
        env:
          ENV_NAME: ${{ steps.names.outputs.env_name }}
          UPSUN_PARENT_ENV: ${{ env.UPSUN_PARENT_ENV }}
          UPSUN_CLI_TOKEN: ${{ secrets.UPSUN_API_TOKEN }}
        run: |
          set -euxo pipefail
          # Activate environment (will build & deploy latest)
          upsun environment:activate --yes --environment "$ENV_NAME" --project "$UPSUN_PROJECT_ID" --parent "$UPSUN_PARENT_ENV"

          # Wait for the environment to be reachable and get its primary URL
          # The CLI usually provides a simple way to get the URL; try primary URL with --pipe
          PRIMARY_URL=$(upsun url --primary --pipe --environment "$ENV_NAME")
          # Fallback: extract the first URL from environment info if the above fails
          if [ -z "$PRIMARY_URL" ]; then
            PRIMARY_URL=$(upsun environment:info --environment "$ENV_NAME" --property=urls --format=plain | head -n1 | awk '{print $1}')
          fi

          echo "base_url=$PRIMARY_URL" >> "$GITHUB_OUTPUT"
          echo "Resolved environment URL: $PRIMARY_URL"

      - name: Install Playwright dependencies
        working-directory: tests/playwright
        run: |
          set -euxo pipefail
          npm ci
          npx playwright install --with-deps

      - name: Run Playwright tests against feature env
        working-directory: tests/playwright
        env:
          BASE_URL: ${{ steps.env.outputs.base_url }}
        run: |
          set -euxo pipefail
          echo "Testing against $BASE_URL"
          npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            tests/playwright/playwright-report
            tests/playwright/test-results
          if-no-files-found: ignore

  # Optional cleanup job that runs when PR is closed to remove the ephemeral env
  cleanup-env:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    needs: [upsun-deploy-and-test]
    env:
      UPSUN_PROJECT_ID: ${{ secrets.UPSUN_PROJECT_ID }}
      UPSUN_API_TOKEN: ${{ secrets.UPSUN_API_TOKEN }}
    steps:
      - name: Setup Upsun CLI
        uses: upsun/action-cli@v1
        with:
          api-token: ${{ secrets.UPSUN_API_TOKEN }}
          project: ${{ secrets.UPSUN_PROJECT_ID }}

      - name: Delete feature environment
        env:
          ENV_NAME: pr-${{ github.event.pull_request.number }}
        run: |
          set -euxo pipefail
          # Delete the environment if it exists
          if upsun environment:info --environment "$ENV_NAME" >/dev/null 2>&1; then
            upsun environment:delete --yes --environment "$ENV_NAME"
          fi
